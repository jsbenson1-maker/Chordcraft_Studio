<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- App Icon Base -->
  <rect width="512" height="512" rx="112" fill="#0f172a"/>

  <!-- 2x2 Chord Sequence Grid -->
  
  <!-- Top-Left Block (Active Chord) -->
  <rect x="64" y="96" width="184" height="152" rx="24" fill="#a7f3d0"/>
  <!-- The Triad (Root, 3rd, 5th) -->
  <rect x="124" y="132" width="64" height="16" rx="8" fill="#064e3b"/>
  <rect x="124" y="164" width="64" height="16" rx="8" fill="#064e3b"/>
  <rect x="124" y="196" width="64" height="16" rx="8" fill="#064e3b"/>

  <!-- Top-Right Block (Upcoming Chord) -->
  <rect x="264" y="96" width="184" height="152" rx="24" fill="#1e293b"/>
  <rect x="324" y="132" width="64" height="16" rx="8" fill="#334155"/>
  <rect x="324" y="164" width="64" height="16" rx="8" fill="#334155"/>
  <rect x="324" y="196" width="64" height="16" rx="8" fill="#334155"/>

  <!-- Bottom-Left Block (Upcoming Chord) -->
  <rect x="64" y="264" width="184" height="152" rx="24" fill="#1e293b"/>
  <rect x="124" y="300" width="64" height="16" rx="8" fill="#334155"/>
  <rect x="124" y="332" width="64" height="16" rx="8" fill="#334155"/>
  <rect x="124" y="364" width="64" height="16" rx="8" fill="#334155"/>

  <!-- Bottom-Right Block (Upcoming Chord) -->
  <rect x="264" y="264" width="184" height="152" rx="24" fill="#1e293b"/>
  <rect x="324" y="300" width="64" height="16" rx="8" fill="#334155"/>
  <rect x="324" y="332" width="64" height="16" rx="8" fill="#334155"/>
  <rect x="324" y="364" width="64" height="16" rx="8" fill="#334155"/>

  <!-- Playhead slicing through the active column -->
  <line x1="156" y1="48" x2="156" y2="464" stroke="#06b6d4" stroke-width="8" stroke-linecap="round"/>
  <!-- Playhead Marker -->
  <polygon points="142,36 170,36 156,60" fill="#06b6d4"/>
</svg>
